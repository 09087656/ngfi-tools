<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💵 Calculateur TJM - NGFI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; }
        .tj-badge {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg max-w-md w-full p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">💵 Calculateur TJM</h1>
            <p class="text-gray-600">Calcule ton TJM optimal en fonction de tes charges</p>
        </div>

        <!-- Email Capture Form (Before Tool) -->
        <form id="emailForm" class="mb-8">
            <input type="email" id="userEmail" placeholder="ton@email.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3" required>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700">
                Accéder à l'outil
            </button>
        </form>

        <!-- Tool Content (Hidden until email) -->
        <div id="toolContent" class="hidden space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Charges mensuelles (€)</label>
                <input type="number" id="chargesInput" placeholder="Ex: 1500" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" min="0" step="10">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Marge souhaitée (€/mois)</label>
                <input type="number" id="marginInput" placeholder="Ex: 500" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" min="0" step="10">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Jours travaillés par mois</label>
                <input type="number" id="daysInput" placeholder="Ex: 20" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" min="1" max="31" step="1">
            </div>
            
            <button id="calculateBtn" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">
                Calculer mon TJM
            </button>
            
            <div id="result" class="hidden bg-indigo-50 p-6 rounded-lg text-center">
                <h2 class="text-xl font-bold text-indigo-800 mb-4">Résultat</h2>
                <div class="tj-badge" id="tjDisplay">0 €/jour</div>
                <p class="text-sm text-gray-600 mt-2" id="details">TJM basé sur 0€ charges + 0€ marge sur 0 jours</p>
            </div>
        </div>

        <!-- Footer NGFI CTA -->
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
            <p class="text-sm text-gray-600 mb-3">
                <strong>NGFI</strong> fait ça automatiquement pour toi
            </p>
            <a href="https://ngfi.fr/demo" class="inline-block bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-2 rounded-lg font-semibold hover:shadow-lg">
                Essaie gratuitement
            </a>
        </div>

        <!-- Logo NGFI -->
        <div class="mt-6 text-center">
            <a href="https://ngfi.fr" class="text-xs text-gray-500 hover:text-gray-700">
                Powered by NGFI
            </a>
        </div>
    </div>

    <script>
        // Email capture
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            
            // POST to Google Sheets or Snov.io (placeholder webhook)
            await fetch('https://hooks.zapier.com/hooks/catch/123456/abcdef/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    tool: 'calculateur-tjm',
                    timestamp: new Date().toISOString()
                })
            }).catch(() => {/* Silent fail for demo */});

            // Show tool
            document.getElementById('emailForm').classList.add('hidden');
            document.getElementById('toolContent').classList.remove('hidden');
        });

        // Calculate TJM
        document.getElementById('calculateBtn').addEventListener('click', () => {
            const charges = parseFloat(document.getElementById('chargesInput').value) || 0;
            const margin = parseFloat(document.getElementById('marginInput').value) || 0;
            const days = parseFloat(document.getElementById('daysInput').value) || 0;
            
            if (days <= 0) {
                alert('Veuillez entrer un nombre valide de jours travaillés');
                return;
            }
            
            // Calculate TJM: (Charges + Marge) / jours travaillés
            const tjm = (charges + margin) / days;
            
            document.getElementById('tjDisplay').textContent = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(tjm) + '/jour';
            document.getElementById('details').textContent = `TJM basé sur ${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(charges)} charges + ${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(margin)} marge sur ${days} jours`;
            document.getElementById('result').classList.remove('hidden');
        });
    </script>
</body>
</html>
