<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Charges Sociales - NGFI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f9fafb;
            --surface: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .button:active {
            transform: translateY(0);
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: var(--bg);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .result.show {
            display: block;
        }

        .result-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-label {
            font-size: 13px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .status-box {
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
        }

        .status-box.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #059669;
        }

        .status-box.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid #f59e0b;
            color: #d97706;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #1e40af;
            margin-top: 16px;
            line-height: 1.6;
        }

        .footer {
            padding: 20px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 12px;
            color: #6b7280;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 0;
            }

            .header {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .content {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Charges Sociales</h1>
            <p>Simulateur pour freelancers français</p>
        </div>

        <div class="content">
            <form id="simulatorForm">
                <div class="form-group">
                    <label for="turnover">Chiffre d'affaires annuel (€)</label>
                    <input 
                        type="number" 
                        id="turnover" 
                        placeholder="50000" 
                        min="0" 
                        step="100"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="status">Statut</label>
                    <select id="status" required>
                        <option value="">-- Sélectionne ton statut --</option>
                        <option value="ae">Auto-Entrepreneur (AE)</option>
                        <option value="eirl">EIRL</option>
                        <option value="eurl">EURL (SARL à associé unique)</option>
                        <option value="sarl">SARL (2+ associés)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="activity">Type d'activité</label>
                    <select id="activity" required>
                        <option value="">-- Sélectionne ton activité --</option>
                        <option value="services">Services/Prestation</option>
                        <option value="commerce">Commerce/Vente</option>
                        <option value="professions">Professions libérales</option>
                    </select>
                </div>

                <button type="submit" class="button">Calculer les charges</button>
            </form>

            <div id="result" class="result">
                <div class="result-item">
                    <div class="result-label">Cotisations sociales annuelles</div>
                    <div class="result-value" id="chargesAmount">€0</div>
                </div>

                <div class="result-item">
                    <div class="result-label">Pourcentage du CA</div>
                    <div class="result-value" id="chargesPercent">0%</div>
                </div>

                <div class="result-item">
                    <div class="result-label">Par mois (moyenne)</div>
                    <div class="result-value" id="chargesMonthly">€0</div>
                </div>

                <div class="info-box" id="summary">
                    Résumé détaillé...
                </div>

                <div id="statusBox"></div>
            </div>
        </div>

        <div class="footer">
            <p>Simulateur gratuit à titre informatif • Résultats non contractuels</p>
            <p style="margin-top: 12px;">Besoin d'automatiser tes charges & facturation? <a href="#">Essaie NGFI</a></p>
        </div>
    </div>

    <script>
        // Social charges rates (France 2026)
        const chargesRates = {
            ae: {
                services: { rate: 0.22, label: 'Auto-Entrepreneur services' },
                commerce: { rate: 0.14, label: 'Auto-Entrepreneur commerce' },
                professions: { rate: 0.22, label: 'Auto-Entrepreneur professions libérales' }
            },
            eirl: {
                services: { rate: 0.45, label: 'EIRL services' },
                commerce: { rate: 0.42, label: 'EIRL commerce' },
                professions: { rate: 0.45, label: 'EIRL professions libérales' }
            },
            eurl: {
                services: { rate: 0.48, label: 'EURL services' },
                commerce: { rate: 0.45, label: 'EURL commerce' },
                professions: { rate: 0.48, label: 'EURL professions libérales' }
            },
            sarl: {
                services: { rate: 0.48, label: 'SARL services' },
                commerce: { rate: 0.45, label: 'SARL commerce' },
                professions: { rate: 0.48, label: 'SARL professions libérales' }
            }
        };

        document.getElementById('simulatorForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const turnover = parseFloat(document.getElementById('turnover').value) || 0;
            const status = document.getElementById('status').value;
            const activity = document.getElementById('activity').value;

            if (!status || !activity || turnover <= 0) {
                alert('Veuillez remplir tous les champs correctement');
                return;
            }

            const rateData = chargesRates[status][activity];
            const rate = rateData.rate;
            
            const chargesAmount = turnover * rate;
            const chargesPercent = (rate * 100).toFixed(1);
            const chargesMonthly = chargesAmount / 12;

            // Display results
            document.getElementById('chargesAmount').textContent = '€' + chargesAmount.toLocaleString('fr-FR', { maximumFractionDigits: 0 });
            document.getElementById('chargesPercent').textContent = chargesPercent + '%';
            document.getElementById('chargesMonthly').textContent = '€' + chargesMonthly.toLocaleString('fr-FR', { maximumFractionDigits: 0 });

            // Summary
            const summary = `
                <strong>${rateData.label}</strong><br>
                Chiffre d'affaires: €${turnover.toLocaleString('fr-FR')}<br>
                Taux: ${chargesPercent}%<br>
                <strong>Total charges/an: €${chargesAmount.toLocaleString('fr-FR', { maximumFractionDigits: 0 })}</strong>
            `;
            document.getElementById('summary').innerHTML = summary;

            // Status box
            const statusBox = document.getElementById('statusBox');
            let statusHTML = '';
            
            if (chargesAmount < turnover * 0.30) {
                statusHTML = '<div class="status-box success">✅ Charges raisonnables pour ce CA</div>';
            } else if (chargesAmount < turnover * 0.45) {
                statusHTML = '<div class="status-box warning">⚠️ Charges modérées - envisage une optimisation fiscale</div>';
            } else {
                statusHTML = '<div class="status-box warning">⚠️ Charges élevées - un conseil fiscal pourrait être utile</div>';
            }

            statusBox.innerHTML = statusHTML;

            document.getElementById('result').classList.add('show');
        });
    </script>
</body>
</html>
