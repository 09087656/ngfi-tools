<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Charges Sociales - NGFI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg max-w-md w-full p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">💰 Simulateur Charges Sociales</h1>
            <p class="text-gray-600">Calcule tes cotisations auto-entrepreneur selon ton CA</p>
        </div>

        <!-- Email Capture Form (Before Tool) -->
        <form id="emailForm" class="mb-8">
            <input type="email" id="userEmail" placeholder="ton@email.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-3" required>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700">
                Accéder à l'outil
            </button>
        </form>

        <!-- Tool Content (Hidden until email) -->
        <div id="toolContent" class="hidden space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Type d'activité</label>
                <select id="activityType" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <option value="vente">Vente de marchandises</option>
                    <option value="service">Prestations de services commerciales/artisanales</option>
                    <option value="liberal">Prestations de services libérales</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Chiffre d'affaires annuel (€)</label>
                <input type="number" id="caInput" placeholder="Ex: 30000" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" min="0" step="100">
            </div>
            
            <button id="calculateBtn" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">
                Calculer mes charges
            </button>
            
            <div id="result" class="hidden bg-indigo-50 p-6 rounded-lg text-center">
                <h2 class="text-xl font-bold text-indigo-800 mb-4">Résultat</h2>
                <p class="text-2xl font-bold text-indigo-600" id="chargesAmount">0 €</p>
                <p class="text-sm text-gray-600 mb-2" id="rateInfo">Taux appliqué : 0%</p>
                <p class="text-sm text-gray-500" id="netRevenue">Après charges : 0 €</p>
            </div>
        </div>

        <!-- Footer NGFI CTA -->
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
            <p class="text-sm text-gray-600 mb-3">
                <strong>NGFI</strong> fait ça automatiquement pour toi
            </p>
            <a href="https://ngfi.fr/demo" class="inline-block bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-2 rounded-lg font-semibold hover:shadow-lg">
                Essaie gratuitement
            </a>
        </div>

        <!-- Logo NGFI -->
        <div class="mt-6 text-center">
            <a href="https://ngfi.fr" class="text-xs text-gray-500 hover:text-gray-700">
                Powered by NGFI
            </a>
        </div>
    </div>

    <script>
        // Email capture
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            
            // POST to Google Sheets or Snov.io (placeholder webhook)
            await fetch('https://hooks.zapier.com/hooks/catch/123456/abcdef/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    tool: 'simulateur-charges',
                    timestamp: new Date().toISOString()
                })
            }).catch(() => {/* Silent fail for demo */});

            // Show tool
            document.getElementById('emailForm').classList.add('hidden');
            document.getElementById('toolContent').classList.remove('hidden');
        });

        // Calculate charges
        document.getElementById('calculateBtn').addEventListener('click', () => {
            const ca = parseFloat(document.getElementById('caInput').value) || 0;
            const activityType = document.getElementById('activityType').value;
            
            if (ca <= 0) {
                alert('Veuillez entrer un chiffre d\'affaires valide');
                return;
            }
            
            let rate = 0;
            let typeText = '';
            
            switch(activityType) {
                case 'vente':
                    rate = 0.123; // 12.3%
                    typeText = 'vente de marchandises';
                    break;
                case 'service':
                    rate = 0.22; // 22.0%
                    typeText = 'prestations de services commerciales/artisanales';
                    break;
                case 'liberal':
                    rate = 0.222; // 22.2%
                    typeText = 'prestations de services libérales';
                    break;
            }
            
            const charges = ca * rate;
            const netRevenue = ca - charges;
            
            document.getElementById('chargesAmount').textContent = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(charges);
            document.getElementById('rateInfo').textContent = `Taux appliqué : ${(rate * 100).toFixed(1)} % pour ${typeText}`;
            document.getElementById('netRevenue').textContent = `Après charges : ${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(netRevenue)}`;
            document.getElementById('result').classList.remove('hidden');
        });
    </script>
</body>
</html>
